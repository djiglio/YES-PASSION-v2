<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yes Passion - Football Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- GLOBAL HEADER -->
        <header id="global-header" style="display: none; padding: 15px 20px; position: absolute; top: 0; left: 0; z-index: 2000; width: 100%; pointer-events: none;">
            <div style="margin: 0; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.9rem; cursor: pointer; color: rgba(255,255,255,0.6); transition: color 0.2s; display: inline-flex; align-items: center; gap: 0.3rem; pointer-events: auto; padding: 0.5rem;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='rgba(255,255,255,0.6)'" onclick="window.location.reload()">
                <span style="font-size: 1.2rem; line-height: 1;">&larr;</span> Menu
            </div>
        </header>        <!-- MAIN CONTENT AREA (Dynamic) -->
        <main id="game-content" class="game-content">
            <div class="loader">Caricamento Dati...</div>
        </main>

        <!-- FOOTER -->
        <footer class="main-footer">
            <p>&copy; Yes Passion - The Nostalgic Football Manager</p>
        </footer>
    </div>

    <!-- ENTRY POINT -->
    <script type="module" src="js/main.js?v=2"></script>
</body>
</html>
