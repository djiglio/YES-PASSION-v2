<!DOCTYPE html>
<html lang="it">
<head>\n<script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
        alert('Error: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo + '\nColumn: ' + columnNo + '\nStack: ' + (error ? error.stack : ''));
        return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
        alert('Promise Error: ' + event.reason);
    });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yes Passion - Football Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- HEADER -->
        <header class="main-header">
            <h1 class="logo">
                <span style="color:#008c45">Y</span><span style="color:#f4f9ff">E</span><span style="color:#cd212a">S</span>
                <span class="logo-passion">Passion</span>
            </h1>
            <div id="status-bar" class="status-bar">
                <span id="current-phase">Caricamento...</span>
            </div>
        </header>

        <!-- MAIN CONTENT AREA (Dynamic) -->
        <main id="game-content" class="game-content">
            <div class="loader">Caricamento Dati...</div>
        </main>

        <!-- FOOTER -->
        <footer class="main-footer">
            <p>&copy; Yes Passion - The Nostalgic Football Manager</p>
        </footer>
    </div>

    <!-- ENTRY POINT -->
    <script type="module" src="js/main.js?v=2"></script>
</body>
</html>
