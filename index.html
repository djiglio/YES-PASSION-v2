<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yes Passion - Football Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- GLOBAL HEADER -->
        <header id="global-header" style="display: none; padding: 15px 20px; position: absolute; top: 0; left: 0; z-index: 2000; width: 100%;">
            <h1 style="margin: 0; font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; cursor: pointer; color: var(--accent); text-shadow: 0 2px 4px rgba(0,0,0,0.8); transition: transform 0.2s; display: inline-block;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onclick="window.location.reload()">YES PASSION</h1>
        </header>        <!-- MAIN CONTENT AREA (Dynamic) -->
        <main id="game-content" class="game-content">
            <div class="loader">Caricamento Dati...</div>
        </main>

        <!-- FOOTER -->
        <footer class="main-footer">
            <p>&copy; Yes Passion - The Nostalgic Football Manager</p>
        </footer>
    </div>

    <!-- ENTRY POINT -->
    <script type="module" src="js/main.js?v=2"></script>
</body>
</html>
